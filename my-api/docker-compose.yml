services:
  postgres:
    image: postgres:16-alpine
    container_name: my_api_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: mydb
    ports:
      - "5434:5432" # ← đổi 5432 thành 5433
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
